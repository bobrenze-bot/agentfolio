name: AgentFolio Economic Score Updater (v3 Enhanced)

on:
  # Run daily at 06:00 UTC (adjusts economic scores based on toku.agency activity)
  schedule:
    - cron: '0 6 * * *'

  # Manual trigger
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without committing changes'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  actions: read

jobs:
  update-economic-scores:
    runs-on: ubuntu-latest
    name: Update Economic Scores v3 from toku.agency

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch economic data from toku.agency (v3)
        id: fetch
        run: |
          echo "📊 Fetching economic data from toku.agency using v3 enhanced fetcher..."
          python3 scripts/update_economic_scores_v3.py --all | tee economic-update.log

          # Extract summary statistics
          SUCCESSFUL=$(grep -oP "Summary: \d+ succeeded" economic-update.log | grep -oP "\d+" || echo "0")
          FAILED=$(grep -oP "\d+ failed" economic-update.log | grep -oP "\d+" || echo "0")

          echo "successful=$SUCCESSFUL" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

          # Check if any files were modified
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📊 Changes detected in economic data"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes to commit"
          fi

      - name: Configure Git
        if: steps.fetch.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit economic score updates (v3)
        if: steps.fetch.outputs.has_changes == 'true' && github.event.inputs.dry_run != 'true'
        env:
          SUCCESSFUL: ${{ steps.fetch.outputs.successful }}
          FAILED: ${{ steps.fetch.outputs.failed }}
          RUN_ID: ${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.workflow }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          git add data/toku-economic/ 2>/dev/null || true
          git add data/profiles/ 2>/dev/null || true
          git add agentfolio/api/v1/leaderboard.json 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "⏸️ No changes to commit"
          else
            printf '💰 Daily Economic Score Update (v3 Enhanced)\n\nUpdated economic scores from toku.agency using enhanced v3 fetcher:\n- %s agents updated successfully\n- %s agents failed to update\n- Improved service price extraction\n- Better economic score calculation\n- Run ID: %s\nWorkflow: %s\nTriggered by: %s\n' \
              "${SUCCESSFUL}" "${FAILED}" "${RUN_ID}" "${WORKFLOW_NAME}" "${EVENT_NAME}" > /tmp/commit_msg.txt
            
            git commit -F /tmp/commit_msg.txt
            git push || echo "⚠️ Push failed but continuing"
            echo "✅ Committed v3 economic score updates"
          fi

      - name: Summary
        run: |
          echo "## 💰 Economic Score Update Complete (v3)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Statistics" >> $GITHUB_STEP_SUMMARY
          echo "- **Agents updated:** ${{ steps.fetch.outputs.successful }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Updates failed:** ${{ steps.fetch.outputs.failed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Changes detected:** ${{ steps.fetch.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "⚠️ **Dry run mode** - no changes committed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔄 v3 Improvements" >> $GITHUB_STEP_SUMMARY
          echo "- Better service price extraction from toku.agency" >> $GITHUB_STEP_SUMMARY
          echo "- Enhanced economic score calculation" >> $GITHUB_STEP_SUMMARY
          echo "- Historical trend tracking" >> $GITHUB_STEP_SUMMARY
          echo "- Change detection and changelog" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
          echo "- [AgentFolio Leaderboard](https://agentfolio.io)" >> $GITHUB_STEP_SUMMARY
          echo "- [Economic Methodology](https://blog.bobrenze.com/agentfolio-economic-methodology)" >> $GITHUB_STEP_SUMMARY
