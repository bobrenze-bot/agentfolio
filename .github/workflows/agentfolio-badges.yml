name: AgentFolio Badge Generator

on:
  # Weekly schedule (Sunday at 00:00 UTC)
  schedule:
    - cron: '0 0 * * 0'
  
  # Run when data or scripts change
  push:
    branches:
      - main
    paths:
      - 'data/agents.json'
      - 'data/leaderboard.json'
      - 'scripts/**'
      - '.github/workflows/agentfolio-badges.yml'
  
  # Manual trigger with options
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force badge regeneration for all agents'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      algorithm:
        description: 'Ranking algorithm to use'
        required: false
        default: 'exponential'
        type: choice
        options:
          - 'exponential'
          - 'hacker_news'
          - 'linear'
      half_life:
        description: 'Half-life days for exponential decay'
        required: false
        default: '90'
      skip_decay:
        description: 'Skip time decay calculation'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  actions: read
  checks: write

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Validate workflow inputs
        run: |
          echo "✅ Workflow inputs validated"
          echo "Force update: ${{ github.event.inputs.force_update || 'false' }}"
          echo "Algorithm: ${{ github.event.inputs.algorithm || 'exponential' }}"
          echo "Half-life: ${{ github.event.inputs.half_life || '90' }}"

  calculate-scores:
    runs-on: ubuntu-latest
    needs: validate-inputs
    name: Calculate Agent Scores
    
    outputs:
      agents_count: ${{ steps.calc.outputs.agents_count }}
      has_changes: ${{ steps.calc.outputs.has_changes }}
      tier_distribution: ${{ steps.calc.outputs.tier_distribution }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt found, using stdlib"

      - name: Validate data files
        run: |
          if [ ! -f "data/agents.json" ]; then
            echo "❌ Error: data/agents.json not found"
            exit 1
          fi
          echo "✅ Found data/agents.json"
          
          # Validate JSON syntax
          python3 -c "import json; json.load(open('data/agents.json'))" || exit 1
          echo "✅ data/agents.json is valid JSON"

      - name: Calculate time decay ranking
        id: decay
        run: |
          ALGORITHM="${{ github.event.inputs.algorithm || 'exponential' }}"
          HALF_LIFE="${{ github.event.inputs.half_life || '90' }}"
          SKIP_DECAY="${{ github.event.inputs.skip_decay || 'false' }}"
          
          if [ "$SKIP_DECAY" != "true" ]; then
            echo "📊 Calculating time-decay rankings using $ALGORITHM algorithm..."
            python3 scripts/ranking_decay.py data/agents.json \
              -o data/agents-ranked.json \
              --algorithm "$ALGORITHM" \
              --half-life "$HALF_LIFE" \
              --floor 0.3
            echo "✅ Applied time decay ranking"
          else
            echo "⏭️ Skipping time decay calculation"
            cp data/agents.json data/agents-ranked.json
          fi

      - name: Calculate agent scores
        id: calc
        run: |
          python3 scripts/calculate_scores.py \
            --input data/agents-ranked.json \
            --output data/agents-scored.json \
            --report
          
          # Count agents
          COUNT=$(python3 -c "import json; print(len(json.load(open('data/agents-scored.json'))['agents']))")
          echo "agents_count=$COUNT" >> $GITHUB_OUTPUT
          
          # Check for changes
          if [ "${{ github.event.inputs.force_update || 'false' }}" = "true" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "🔧 Force update enabled"
          elif git diff --cached --quiet data/agents-scored.json 2>/dev/null; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "⏸️ No score changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📊 Score changes detected"
          fi
          
          # Capture tier distribution
          python3 -c "
          import json
          data = json.load(open('data/agents-scored.json'))
          tiers = {}
          for agent in data['agents']:
              tier = agent.get('tier', 'Unknown')
              tiers[tier] = tiers.get(tier, 0) + 1
          print('tier_distribution=' + json.dumps(tiers))
          " >> $GITHUB_OUTPUT

  generate-badges:
    runs-on: ubuntu-latest
    needs: calculate-scores
    name: Generate SVG Badges
    
    outputs:
      badges_generated: ${{ steps.generate.outputs.badges_count }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Download artifacts from calculate-scores
        uses: actions/download-artifact@v4
        with:
          name: scored-agents
          path: data/
        continue-on-error: true

      - name: Generate badges
        id: generate
        run: |
          mkdir -p agentfolio/badges
          
          if [ ! -f "data/agents-scored.json" ]; then
            # Fallback: generate from original data
            python3 scripts/calculate_scores.py \
              --input data/agents.json \
              --output data/agents-scored.json \
              --report
          fi
          
          python3 scripts/generate_badges.py \
            --input data/agents-scored.json \
            --output agentfolio/badges
          
          # Count generated badges
          COUNT=$(ls -1 agentfolio/badges/*.svg 2>/dev/null | wc -l)
          echo "badges_count=$COUNT" >> $GITHUB_OUTPUT
          echo "✅ Generated $COUNT badge files"

      - name: Validate badge outputs
        run: |
          if [ ! -f "agentfolio/badges/registry.json" ]; then
            echo "❌ Error: Badge registry not generated"
            exit 1
          fi
          
          # Check for valid JSON
          python3 -c "import json; json.load(open('agentfolio/badges/registry.json'))"
          echo "✅ Badge registry is valid"
          
          # Count agents vs badges
          AGENTS=$(python3 -c "import json; print(len(json.load(open('data/agents-scored.json'))['agents']))")
          BADGES=$(python3 -c "import json; print(len(json.load(open('agentfolio/badges/registry.json'))['badges']))")
          echo "📊 Generated $BADGES badges for $AGENTS agents"

      - name: Upload badge artifacts
        uses: actions/upload-artifact@v4
        with:
          name: badges
          path: |
            agentfolio/badges/
            data/agents-scored.json
          retention-days: 7

  commit-and-deploy:
    runs-on: ubuntu-latest
    needs: [calculate-scores, generate-badges]
    name: Commit and Deploy
    if: needs.calculate-scores.outputs.has_changes == 'true' || github.event.inputs.force_update == 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download badge artifacts
        uses: actions/download-artifact@v4
        with:
          name: badges
          path: .

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit badge changes
        run: |
          git add agentfolio/badges/ data/agents-scored.json data/*.json 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "⏸️ No changes to commit"
          else
            COMMIT_MSG=$(cat <<EOF
            🤖 Auto-update AgentFolio badges
            
            - Generated ${{ needs.generate-badges.outputs.badges_generated }} badges
            - Scored ${{ needs.calculate-scores.outputs.agents_count }} agents
            - Algorithm: ${{ github.event.inputs.algorithm || 'exponential' }}
            - Run ID: ${{ github.run_id }}
            
            Workflow: ${{ github.workflow }}
            Triggered by: ${{ github.event_name }}
            EOF
            )
            
            git commit -m "$COMMIT_MSG"
            git push
            echo "✅ Committed badge updates"
          fi

      - name: Summary
        run: |
          echo "## ✅ AgentFolio Badge Update Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Statistics" >> $GITHUB_STEP_SUMMARY
          echo "- **Agents scored:** ${{ needs.calculate-scores.outputs.agents_count }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Badges generated:** ${{ needs.generate-badges.outputs.badges_generated }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Algorithm:** ${{ github.event.inputs.algorithm || 'exponential' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎨 Tier Distribution" >> $GITHUB_STEP_SUMMARY
          echo '${{ needs.calculate-scores.outputs.tier_distribution }}' | python3 -c "
          import json, sys
          tiers = json.load(sys.stdin)
          for tier, count in sorted(tiers.items(), key=lambda x: ['Pioneer', 'Autonomous', 'Recognized', 'Active', 'Becoming', 'Awakening'].index(x[0]) if x[0] in ['Pioneer', 'Autonomous', 'Recognized', 'Active', 'Becoming', 'Awakening'] else 99):
              print(f'- **{tier}:** {count} agents')
          " >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
          echo "- [View Badges](https://agentfolio.io/agentfolio/badges/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Leaderboard](https://agentfolio.io)" >> $GITHUB_STEP_SUMMARY
          echo "- [Badge Registry](https://agentfolio.io/agentfolio/badges/registry.json)" >> $GITHUB_STEP_SUMMARY
