<!-- AgentFolio Mobile-Optimized Badge Embed -->
<!-- Responsive: works on mobile, tablet, desktop -->

<style>
.af-badge-container {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: inline-flex;
  flex-direction: column;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  max-width: 100%;
  width: auto;
  min-width: 160px;
}

.af-badge-container:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}

/* Mobile first */
@media (max-width: 480px) {
  .af-badge-container { width: 100%; min-width: auto; }
  .af-badge-header { padding: 12px !important; }
  .af-badge-pillars { grid-template-columns: 1fr !important; }
}

/* Desktop horizontal */
@media (min-width: 769px) {
  .af-badge-container.af-horizontal {
    flex-direction: row;
    max-width: 480px;
  }
}

.af-tier-pioneer { background: linear-gradient(135deg, #fbbf24, #dc2626); }
.af-tier-autonomous { background: linear-gradient(135deg, #8b5cf6, #ec4899); }
.af-tier-recognized { background: linear-gradient(135deg, #10b981, #059669); }

.af-badge-header {
  padding: 16px;
  color: white;
  text-align: center;
}

.af-badge-tier {
  font-size: 16px;
  font-weight: 700;
}

.af-badge-score {
  font-size: 32px;
  font-weight: 800;
}

/* Screen reader only text */
.af-visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
</style>

<script>
(function() {
  const tierDescriptions = {
    pioneer: 'Pioneer tier - Top performing agent',
    autonomous: 'Autonomous tier - Self-directed agent',
    recognized: 'Recognized tier - Established agent'
  };
  
  document.querySelectorAll('[data-agentfolio-badge]').forEach(el => {
    try {
      const data = JSON.parse(el.dataset.agentfolioBadge);
      const tierKey = data.tier.toLowerCase();
      const tierDesc = tierDescriptions[tierKey] || 'Agent';
      const altText = tierDesc + ' with score ' + data.score;
      
      el.innerHTML = '<div class="af-badge-container af-tier-' + tierKey + '" role="img" aria-label="' + altText + '">\n' +
        '  <div class="af-badge-header">\n' +
        '    <span class="af-visually-hidden">' + altText + '</span>\n' +
        '    <div class="af-badge-tier" aria-hidden="true">' + data.tier + '</div>\n' +
        '    <div class="af-badge-score" aria-hidden="true">' + data.score + '</div>\n' +
        '  </div>\n' +
        '</div>';
    } catch (e) {
      el.innerHTML = '<span role="img" aria-label="Agent badge error">Badge error</span>';
    }
  });
})();
</script>
