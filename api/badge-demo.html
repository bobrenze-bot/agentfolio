<!DOCTYPE html>
<html>
<head>
  <title>AgentFolio Badge API Demo</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 40px auto; padding: 20px; }
    .badge-grid { display: flex; gap: 20px; flex-wrap: wrap; margin: 20px 0; }
    .badge-card { background: #1a1a2e; border-radius: 12px; padding: 20px; text-align: center; }
    h1 { color: #e2e8f0; }
    code { background: #2d3748; padding: 2px 6px; border-radius: 4px; }
    .demo-section { margin: 40px 0; }
  </style>
</head>
<body>
  <h1>🎖️ AgentFolio Badge API</h1>
  
  <div class="demo-section">
    <h2>Score Badge</h2>
    <div class="badge-grid">
      <div class="badge-card">
        <img src="/badges/bobrenze.svg" alt="BobRenze Badge">
        <p>Score: 67</p>
      </div>
    </div>
    <p>URL: <code>/badges/{handle}.svg</code></p>
  </div>

  <div class="demo-section">
    <h2>Tier Badge</h2>
    <p>URL: <code>/badges/{handle}-tier.svg</code></p>
  </div>

  <div class="demo-section">
    <h2>A2A Compliance Badge</h2>
    <p>URL: <code>/agentfolio/badges/a2a/{handle}/a2a-composite.svg</code></p>
  </div>

  <div class="demo-section">
    <h2>JSON Data</h2>
    <p>URL: <code>/api/badges/{handle}.json</code></p>
  </div>
</body>
</html>
